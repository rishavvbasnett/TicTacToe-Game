<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <script src="./index.js" defer></script>
    <link rel="stylesheet" href="./reset.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="header">Tic Tac Toe</div>
    <div class="outerContainer">
        <div class="player1Info">
            <div class="playerBox p1">Player 1</div>
            <div class="p1Sign">X</div>
        </div>
        <div class="container">
            <div class="box0" data-index="0"></div>
            <div class="box1" data-index="1"></div>
            <div class="box2" data-index="2"></div>
            <div class="box3" data-index="3"></div>
            <div class="box4" data-index="4"></div>
            <div class="box5" data-index="5"></div>
            <div class="box6" data-index="6"></div>
            <div class="box7" data-index="7"></div>
            <div class="box8>" data-index="8"></div>
        </div>
        <div class="player2Info">
            <div class="playerBox p2">Player 2</div>
            <div class="p2Sign">O</div>
        </div>

    </div>
    <div class="display">
    </div>

    <!--Starting dialog box-->
    <dialog class="startGameDialog">
        <h1>Tic Tac Toe</h1>
        <div class="player1Name">
            <label for="player1">Player 1 Name:</label>
            <input type="text" id="player1">
            <button class="enter">Enter</button>
        </div>
        <div class="player2Name">
            <label for="player2">Player 2 Name:</label>
            <input type="text" id="player2">
            <button class="enter">Enter</button>
        </div>
        <button class="play">Play</button>
    </dialog>

    <!--The dialog modal box that opens after a game is won -->
    <dialog class="endGameDialog">
        <div></div>
        <button>Play Again</button>
    </dialog>
</body>
</html>
